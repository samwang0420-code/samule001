<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Dashboard - Internal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <div class="w-64 gradient-bg text-white">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fas fa-bullseye text-purple-600"></i>
                    </div>
                    <div>
                        <h1 class="font-bold">GEO Dashboard</h1>
                        <p class="text-xs text-purple-200">Internal System</p>
                    </div>
                </div>
                
                <nav class="space-y-2">
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-white bg-opacity-20 rounded-lg">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-white hover:bg-opacity-10 rounded-lg transition">
                        <i class="fas fa-users"></i>
                        <span>Clients</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-white hover:bg-opacity-10 rounded-lg transition">
                        <i class="fas fa-search-plus"></i>
                        <span>New Analysis</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-white hover:bg-opacity-10 rounded-lg transition">
                        <i class="fas fa-chart-line"></i>
                        <span>Rankings</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-white hover:bg-opacity-10 rounded-lg transition">
                        <i class="fas fa-robot"></i>
                        <span>AI Citations</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-white hover:bg-opacity-10 rounded-lg transition">
                        <i class="fas fa-file-alt"></i>
                        <span>Reports</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
                    <p class="text-gray-500">Overview of all GEO activities</p>
                </div>
                
                <button onclick="refreshData()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </header>

            <!-- Stats Grid -->
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm">Active Clients</p>
                            <h3 class="text-3xl font-bold text-gray-800 mt-1" id="stat-clients">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-users text-blue-600"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm">Avg GEO Score</p>
                            <h3 class="text-3xl font-bold text-gray-800 mt-1" id="stat-score">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-chart-pie text-green-600"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm">AI Citations</p>
                            <h3 class="text-3xl font-bold text-gray-800 mt-1" id="stat-citations">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-robot text-purple-600"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm">Keywords Tracked</p>
                            <h3 class="text-3xl font-bold text-gray-800 mt-1" id="stat-keywords">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-tags text-orange-600"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Clients Table -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Clients</h3>
                    <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                        <i class="fas fa-plus mr-2"></i>New Analysis
                    </a>
                </div>
                
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="text-left py-4 px-6 font-semibold text-gray-600">Business</th>
                            <th class="text-left py-4 px-6 font-semibold text-gray-600">Industry</th>
                            <th class="text-left py-4 px-6 font-semibold text-gray-600">GEO Score</th>
                            <th class="text-left py-4 px-6 font-semibold text-gray-600">Status</th>
                        </tr>
                    </thead>
                    <tbody id="clients-table">
                        <tr>
                            <td colspan="4" class="text-center py-8 text-gray-500">Loading clients...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/clients');
                const data = await res.json();
                
                if (data.success) {
                    const clients = data.data;
                    document.getElementById('stat-clients').textContent = clients.length;
                    
                    const tbody = document.getElementById('clients-table');
                    tbody.innerHTML = clients.map(c => `
                        <tr class="border-t hover:bg-gray-50">
                            <td class="py-4 px-6">${c.name}</td>
                            <td class="py-4 px-6"><span class="px-2 py-1 bg-gray-100 rounded">${c.industry}</span></td>
                            <td class="py-4 px-6"><strong>${c.geoScore || '-'}/100</strong></td>
                            <td class="py-4 px-6"><span class="px-2 py-1 bg-green-100 text-green-800 rounded">${c.status}</span></td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        function refreshData() {
            loadData();
        }
        
        loadData();
    </script>
</body>
</html>
