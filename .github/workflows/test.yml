name: Run Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: core-engine/package-lock.json
    
    - name: Install dependencies
      working-directory: ./core-engine
      run: npm ci
    
    - name: Run linting
      working-directory: ./core-engine
      run: |
        # Check for syntax errors in all JS files
        find . -name "*.js" -type f ! -path "./node_modules/*" -exec node --check {} \;
    
    - name: Run unit tests
      working-directory: ./core-engine
      run: npm test
      env:
        NODE_ENV: test
        DEMO_MODE: true
    
    - name: Check production readiness
      working-directory: ./core-engine
      run: |
        chmod +x production-check.sh
        ./production-check.sh || true

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./core-engine
        push: false
        tags: geo-dashboard:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
